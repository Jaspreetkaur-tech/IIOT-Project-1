<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Predictor | Intelligence AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <h2>Customer Churn Intelligence</h2>
        
        <form action="/predict" method="post">
            <div class="form-grid">
                <!-- Section 1: Demographic Information -->
                <div class="form-section">Demographic Information</div>
                
                <div class="input-group">
                    <label for="gender">Gender</label>
                    <select name="gender" id="gender">
                        <option value="0">Female</option>
                        <option value="1">Male</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="SeniorCitizen">Senior Citizen</label>
                    <select name="SeniorCitizen" id="SeniorCitizen">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="Partner">Partner</label>
                    <select name="Partner" id="Partner">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="Dependents">Dependents</label>
                    <select name="Dependents" id="Dependents">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <!-- Section 2: Account Details -->
                <div class="form-section">Account Details</div>
                
                <div class="input-group">
                    <label for="tenure">Tenure (Months)</label>
                    <input type="number" name="tenure" id="tenure" placeholder="e.g. 12" required>
                </div>
                
                <div class="input-group">
                    <label for="PhoneService">Phone Service</label>
                    <select name="PhoneService" id="PhoneService">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="MultipleLines">Multiple Lines</label>
                    <select name="MultipleLines" id="MultipleLines">
                        <option value="0">No</option>
                        <option value="1">No phone service</option>
                        <option value="2">Yes</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="InternetService">Internet Service</label>
                    <select name="InternetService" id="InternetService">
                        <option value="0">DSL</option>
                        <option value="1">Fiber optic</option>
                        <option value="2">No</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="Contract">Contract Type</label>
                    <select name="Contract" id="Contract">
                        <option value="0">Month-to-month</option>
                        <option value="1">One year</option>
                        <option value="2">Two year</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="PaperlessBilling">Paperless Billing</label>
                    <select name="PaperlessBilling" id="PaperlessBilling">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <!-- Section 3: Service Support -->
                <div class="form-section">Service & Support</div>
                
                <div class="input-group">
                    <label for="OnlineSecurity">Online Security</label>
                    <select name="OnlineSecurity" id="OnlineSecurity">
                        <option value="0">No</option>
                        <option value="1">No internet service</option>
                        <option value="2">Yes</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="OnlineBackup">Online Backup</label>
                    <select name="OnlineBackup" id="OnlineBackup">
                        <option value="0">No</option>
                        <option value="1">No internet service</option>
                        <option value="2">Yes</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="DeviceProtection">Device Protection</label>
                    <select name="DeviceProtection" id="DeviceProtection">
                        <option value="0">No</option>
                        <option value="1">No internet service</option>
                        <option value="2">Yes</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="TechSupport">Tech Support</label>
                    <select name="TechSupport" id="TechSupport">
                        <option value="0">No</option>
                        <option value="1">No internet service</option>
                        <option value="2">Yes</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="StreamingTV">Streaming TV</label>
                    <select name="StreamingTV" id="StreamingTV">
                        <option value="0">No</option>
                        <option value="1">No internet service</option>
                        <option value="2">Yes</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="StreamingMovies">Streaming Movies</label>
                    <select name="StreamingMovies" id="StreamingMovies">
                        <option value="0">No</option>
                        <option value="1">No internet service</option>
                        <option value="2">Yes</option>
                    </select>
                </div>

                <!-- Section 4: Financial Metrics -->
                <div class="form-section">Financial Metrics</div>
                
                <div class="input-group">
                    <label for="PaymentMethod">Payment Method</label>
                    <select name="PaymentMethod" id="PaymentMethod">
                        <option value="0">Bank transfer (automatic)</option>
                        <option value="1">Credit card (automatic)</option>
                        <option value="2">Electronic check</option>
                        <option value="3">Mailed check</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="MonthlyCharges">Monthly Charges ($)</label>
                    <input type="number" step="0.01" name="MonthlyCharges" id="MonthlyCharges" placeholder="e.g. 70.35" required>
                </div>
                
                <div class="input-group">
                    <label for="TotalCharges">Total Charges ($)</label>
                    <input type="number" step="0.01" name="TotalCharges" id="TotalCharges" placeholder="e.g. 1500.20" required>
                </div>
            </div>

            <button type="submit">Analyze Churn Probability</button>
        </form>

        {% if prediction_text %}
        <div class="result-card">
            <p class="result-text {% if 'stays' in prediction_text.lower() or 'stay' in prediction_text.lower() %}stay{% else %}churn{% endif %}">
                {{ prediction_text }}
            </p>
        </div>
        {% endif %}
    </div>
</body>
</html>
